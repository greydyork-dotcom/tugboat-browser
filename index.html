<!DOCTYPE html>
<html>
<head>
  <title>Tugboat Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b3d91;
      color: white;
      text-align: center;
    }
    header {
      padding: 15px;
      background: #062a66;
      font-size: 26px;
    }
    input {
      width: 70%;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }
    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: orange;
      font-weight: bold;
    }
    iframe {
      width: 100%;
      height: 80vh;
      border: none;
    }
  </style>
</head>

<body>

<header>🚢 Tugboat Browser</header>

<input id="search" placeholder="Search or enter URL">
<button onclick="go()">Go</button>
<button onclick="newTab()">New Tab</button>

<iframe id="frame"></iframe>

<script>
function go() {
  let url = document.getElementById("search").value;

  if (!url.startsWith("http")) {
    url = "https://www.google.com/search?q=" + url;
  }

  document.getElementById("frame").src = url;
}

function newTab() {
  let url = document.getElementById("search").value;

  if (!url.startsWith("http")) {
    url = "https://www.google.com/search?q=" + url;
  }

  window.open(url, "_blank");
}
</script>

</body>
</html>
